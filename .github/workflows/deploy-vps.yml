name: Deploy VPS

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "docker/**"
      - "docker-compose.yml"
      - ".github/workflows/deploy-vps.yml"
      - "scripts/deploy-vps-whatsapp.sh"
      - "scripts/deploy-vps-whatsapp-ci.sh"
  workflow_dispatch:
    inputs:
      target:
        description: "Environment to deploy"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production
          - both

jobs:
  deploy-staging:
    name: Deploy staging
    if: github.event_name == 'push' || inputs.target == 'staging' || inputs.target == 'both'
    runs-on: ubuntu-latest
    environment: staging
    concurrency:
      group: go-whatsapp-staging
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to staging VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST || '217.216.110.140' }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          VPS_USER: ${{ secrets.VPS_USER || 'root' }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          DEPLOY_ROOT: /opt/shurkou/staging
        run: ./scripts/deploy-vps-whatsapp-ci.sh

  deploy-production:
    name: Deploy production
    if: github.event_name == 'workflow_dispatch' && (inputs.target == 'production' || inputs.target == 'both')
    runs-on: ubuntu-latest
    environment: production
    concurrency:
      group: go-whatsapp-production
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production VPS
        env:
          VPS_HOST: ${{ secrets.VPS_HOST || '217.216.110.140' }}
          VPS_PORT: ${{ secrets.VPS_PORT || '22' }}
          VPS_USER: ${{ secrets.VPS_USER || 'root' }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_PASSWORD: ${{ secrets.VPS_PASSWORD }}
          DEPLOY_ROOT: /opt/shurkou/production
        run: ./scripts/deploy-vps-whatsapp-ci.sh
